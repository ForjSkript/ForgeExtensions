<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="https://avatars.githubusercontent.com/u/257225591?v=4"
    />
    <title>ForjSkript Extension List</title>

    <link rel="preconnect" href="https://avatars.githubusercontent.com" />
    <link rel="preconnect" href="https://raw.githubusercontent.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />

    <!-- SEO -->
    <meta name="description" content="List of extensions for ForgeScript." />
    <meta name="author" content="ForjSkript" />
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#0e0f14" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ForgeExtensions" />
    <meta
      property="og:description"
      content="List of extensions for ForgeScript."
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="min-h-screen bg-[#0e0f14] text-slate-200 antialiased">
    <!-- Grid background -->
    <div
      class="fixed inset-0 -z-10 opacity-[0.05]"
      style="
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
        background-size: 48px 48px;
      "
    ></div>
    <div class="max-w-5xl mx-auto px-4 pt-10">
      <h1 class="text-2xl font-bold mb-4">ForgeExtensions</h1>

      <!-- Search -->
      <input
        id="search"
        type="text"
        placeholder="Search extensions..."
        class="w-full px-4 py-2 rounded-lg bg-[#151821] border border-slate-800 focus:outline-none focus:border-slate-600 text-sm"
      />
    </div>

    <!-- Extensions container -->
    <div
      id="extensions"
      class="max-w-5xl mx-auto px-4 py-8 grid gap-4 sm:grid-cols-2"
    ></div>
    <footer class="text-center py-6 text-[0.7rem] text-slate-600">
      Try out
      <a class="text-[rgb(--accent-code)]" href="https://github.com/ForjSkript"
        >ForjSkript</a
      >
    </footer>
    <script src="script.js" type="text/javascript" charset="utf-8"></script>
  </body>
</html>
